{% extends 'base.html' %}
{% block title %}{{ action }} Item{% endblock %}
{% block page_title %}{{ action }} Item{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="page-header">
        <h1><i class="bi bi-box-seam"></i> {{ action }} Item</h1>
        <a href="{% url 'item_list' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <span>Item Details</span>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label">Item Name *</label>
                                <input type="text" name="name" class="form-control" value="{{ item.name|default:'' }}" required placeholder="e.g. Masala Chai">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Category *</label>
                                <select name="category" class="form-select" required>
                                    <option value="">Select...</option>
                                    {% for cat in categories %}
                                    <option value="{{ cat.id }}" {% if item.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Selling Price (₹) *</label>
                                <input type="number" name="price" class="form-control" step="0.01" min="0" value="{{ item.price|default:'' }}" required placeholder="0.00">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Cost Price (₹)</label>
                                <input type="number" name="cost_price" class="form-control" step="0.01" min="0" value="{{ item.cost_price|default:'0' }}" placeholder="0.00">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Tax Rate (%)</label>
                                <input type="number" name="tax_rate" class="form-control" step="0.01" min="0" max="100" value="{{ item.tax_rate|default:'0' }}" placeholder="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Stock Quantity</label>
                                <input type="number" name="stock_quantity" class="form-control" min="0" value="{{ item.stock_quantity|default:'0' }}" placeholder="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Min Stock Level (Alert)</label>
                                <input type="number" name="min_stock_level" class="form-control" min="0" value="{{ item.min_stock_level|default:'5' }}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Barcode (Optional)</label>
                                <input type="text" name="barcode" class="form-control" value="{{ item.barcode|default:'' }}" placeholder="Scan or enter barcode">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea name="description" class="form-control" rows="2" placeholder="Brief description...">{{ item.description|default:'' }}</textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Item Image (Optional)</label>
                                <input type="file" name="image" class="form-control" accept="image/*">
                                {% if item.image %}
                                <div class="mt-2">
                                    <img src="{{ item.image.url }}" alt="Current image" style="height:60px;border-radius:8px;">
                                    <small class="text-muted ms-2">Current image</small>
                                </div>
                                {% endif %}
                            </div>
                            <div class="col-md-6 d-flex align-items-end">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" name="is_active" id="isActive" 
                                           {% if item.is_active or not item %}checked{% endif %}>
                                    <label class="form-check-label" for="isActive">Active (visible in POS)</label>
                                </div>
                            </div>
                            <div class="col-12 d-flex gap-3 justify-content-end mt-2">
                                <a href="{% url 'item_list' %}" class="btn btn-outline-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-{% if action == 'Create' %}plus-circle{% else %}check-circle{% endif %}"></i>
                                    {{ action }} Item
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
